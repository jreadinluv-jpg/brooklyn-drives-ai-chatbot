<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maya — Image Driving School Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a1a2e;
    --accent: #e63946;
    --accent2: #f4a261;
    --surface: #ffffff;
    --surface2: #f8f8f8;
    --text: #1a1a2e;
    --text-light: #6b7280;
    --border: #e5e7eb;
    --maya-bubble: #1a1a2e;
    --user-bubble: #e63946;
    --shadow: 0 20px 60px rgba(26,26,46,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .chat-wrapper {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .chat-header {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .maya-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    position: relative;
  }

  .maya-avatar::after {
    content: '';
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    background: #22c55e;
    border-radius: 50%;
    border: 2px solid #1a1a2e;
  }

  .header-info h1 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: white;
    line-height: 1.2;
  }

  .header-info p {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  .school-badge {
    margin-left: auto;
    background: rgba(230,57,70,0.2);
    border: 1px solid rgba(230,57,70,0.4);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: #f87171;
    font-weight: 500;
    white-space: nowrap;
  }

  .chat-container {
    background: var(--surface);
    border-radius: 24px;
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 580px;
  }

  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.maya .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .message.user .msg-avatar {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    font-size: 11px;
    font-weight: 600;
  }

  .msg-content { max-width: 80%; display: flex; flex-direction: column; gap: 6px; }
  .message.user .msg-content { align-items: flex-end; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }

  .message.maya .msg-bubble {
    background: var(--surface2);
    color: var(--text);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .message.user .msg-bubble {
    background: var(--user-bubble);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 11px;
    color: var(--text-light);
    padding: 0 4px;
  }

  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .quick-reply {
    background: white;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .quick-reply:hover {
    background: var(--accent);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(230,57,70,0.25);
  }

  .typing-indicator {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .typing-dots {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--text-light);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: white;
  }

  .input-box {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 11px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 100px;
    overflow-y: auto;
    transition: border-color 0.2s;
    background: var(--surface2);
  }

  .input-box:focus { border-color: var(--accent); background: white; }
  .input-box::placeholder { color: var(--text-light); }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(230,57,70,0.3);
  }

  .send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 16px rgba(230,57,70,0.4); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 18px; height: 18px; fill: white; }

  .chat-footer {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-info {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }

  .footer-info span {
    color: rgba(255,255,255,0.8);
    font-weight: 500;
  }

  .call-btn {
    background: rgba(230,57,70,0.2);
    border: 1px solid rgba(230,57,70,0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: #f87171;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .call-btn:hover {
    background: rgba(230,57,70,0.3);
    color: white;
  }

  .error-msg {
    background: #fff5f5;
    border: 1px solid #fecaca;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: #dc2626;
    margin: 0 20px;
  }
</style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="maya-avatar">🚗</div>
    <div class="header-info">
      <h1>Maya</h1>
      <p>Image Driving School Assistant</p>
    </div>
    <div class="school-badge">Since 1979</div>
  </div>

  <!-- Chat Window -->
  <div class="chat-container">
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-area">
      <textarea
        class="input-box"
        id="inputBox"
        placeholder="Ask Maya anything..."
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- Footer -->
  <div class="chat-footer">
    <div class="footer-info">📞 <span>(718) 922-2600</span> · Mon–Fri 9am–6pm · Sat 10am–4pm</div>
    <a href="tel:+17189222600" class="call-btn">Call Now</a>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `You are Maya, a warm and helpful assistant for Image Driving School at BrooklynDrives.com — a Brooklyn driving school serving the community since 1979. You serve East Flatbush, Canarsie, East New York, Georgetown, Flatlands, Mill Basin, and surrounding Brooklyn neighborhoods.

Your personality: You are friendly, patient, encouraging, and conversational. You talk like a real person — never robotic, never scripted. You keep responses short and warm. Many users are nervous first-time drivers so always be reassuring and supportive.

CORE KNOWLEDGE:
- Driving lessons: Start as low as $47. Packages save up to $195 vs individual prices. $95 deposit with pay-as-you-go available.
- 5 Hour Pre-Licensing Class: $45 per class. Available 8 times per week. Zoom and in-person options. Evening classes available. Required before road test.
- Defensive Driving: In-person $49 (certificate in 3-5 days, classes twice a week). Online $37.45 through IMPROV Learning affiliate.
- Road Tests: Currently scheduling April 2nd at Seaview Road Test Site. Rush/early road test available for just $20 extra — usually within a few days.
- Payment: Visa, Mastercard, Amex, Discover accepted. No hidden fees or extra charges — prices shown are final total.
- 284 students have already passed their road test with Image Driving School in 2026!
- Contact: (718) 922-2600 | brooklyndrives@yahoo.com
- Address: 9621 Flatlands Ave, Brooklyn, NY 11236
- Hours: Monday–Friday 9am–6pm, Saturday 10am–4pm
- Website: brooklyndrives.com has a Customize Package Tool to build and purchase custom packages online.

PLAYBOOK INSTRUCTIONS:

PLAYBOOK 1 — WELCOME:
When someone first messages, greet them warmly as Maya. Ask what brings them in today. Listen for what they need: lessons, 5 hour class, defensive driving, road test info, or pricing. Always confirm their Brooklyn neighborhood to make sure you service their area.

PLAYBOOK 2 — SERVICE INFO:
Match their need to the right service. Explain naturally in your own words — never in bullet points or lists. Always end with a question to keep the conversation going.

PLAYBOOK 3 — NEIGHBORHOOD QUALIFICATION:
If someone mentions their neighborhood check if it is in the service area: East Flatbush, Canarsie, East New York, Georgetown, Flatlands, Mill Basin. If unsure warmly direct them to call (718) 922-2600.

PLAYBOOK 4 — LEAD CAPTURE:
When someone is ready to be contacted collect info one question at a time naturally:
1. Full name
2. Phone number
3. Email
4. Neighborhood  
5. Which service they want
After collecting all info confirm warmly and let them know the team will follow up within 1 business day.

PLAYBOOK 5 — HUMAN HANDOFF:
If someone asks to speak to a person or you cannot confidently answer, warmly provide: Phone (718) 922-2600, Email brooklyndrives@yahoo.com, Hours Mon-Fri 9am-6pm Sat 10am-4pm.

PLAYBOOK 6 — FALLBACK:
If you are unsure about something never make up information. Say you want to get them the right answer and direct them to call (718) 922-2600.

RULES YOU NEVER BREAK:
- Never mention competitors
- Never make up prices, dates, or schedules not listed above
- Never promise specific instructors or exact time slots
- Never discuss refunds — always direct to team
- Always end every response with a question or clear next step
- Keep responses short, warm, and conversational
- Never use bullet points or numbered lists in responses
- Talk like a real helpful person, not a script`;

let conversationHistory = [];
let isLoading = false;

function getTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function scrollToBottom() {
  const area = document.getElementById('messagesArea');
  area.scrollTop = area.scrollHeight;
}

function addMessage(role, text, quickReplies = []) {
  const area = document.getElementById('messagesArea');

  const wrapper = document.createElement('div');
  wrapper.className = `message ${role}`;

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = role === 'maya' ? '🚗' : 'You';

  const contentEl = document.createElement('div');
  contentEl.className = 'msg-content';

  const bubbleEl = document.createElement('div');
  bubbleEl.className = 'msg-bubble';
  bubbleEl.textContent = text;

  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = getTime();

  contentEl.appendChild(bubbleEl);

  if (quickReplies.length > 0) {
    const qrContainer = document.createElement('div');
    qrContainer.className = 'quick-replies';
    quickReplies.forEach(reply => {
      const btn = document.createElement('button');
      btn.className = 'quick-reply';
      btn.textContent = reply;
      btn.onclick = () => {
        qrContainer.remove();
        handleQuickReply(reply);
      };
      qrContainer.appendChild(btn);
    });
    contentEl.appendChild(qrContainer);
  }

  contentEl.appendChild(timeEl);

  if (role === 'maya') {
    wrapper.appendChild(avatarEl);
    wrapper.appendChild(contentEl);
  } else {
    wrapper.appendChild(contentEl);
    wrapper.appendChild(avatarEl);
  }

  area.appendChild(wrapper);
  scrollToBottom();
}

function showTyping() {
  const area = document.getElementById('messagesArea');
  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.id = 'typingIndicator';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🚗';

  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  indicator.appendChild(avatar);
  indicator.appendChild(dots);
  area.appendChild(indicator);
  scrollToBottom();
}

function hideTyping() {
  const indicator = document.getElementById('typingIndicator');
  if (indicator) indicator.remove();
}

function handleQuickReply(text) {
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  getAIResponse(text);
}

async function getAIResponse(userMessage) {
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    hideTyping();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });

      // Determine contextual quick replies based on response content
      let quickReplies = [];
      const lowerReply = reply.toLowerCase();

      if (conversationHistory.length <= 2) {
        quickReplies = ['Book a Lesson', '5 Hour Class', 'Defensive Driving', 'Road Test Info'];
      } else if (lowerReply.includes('lesson') && !lowerReply.includes('5 hour')) {
        quickReplies = ['Tell me about packages', 'What is the price?', 'Book now'];
      } else if (lowerReply.includes('5 hour') || lowerReply.includes('five hour')) {
        quickReplies = ['Zoom option', 'In-person option', 'Evening class'];
      } else if (lowerReply.includes('road test')) {
        quickReplies = ['Rush road test', 'I have my permit', 'Need more lessons first'];
      } else if (lowerReply.includes('defensive')) {
        quickReplies = ['In-person class', 'Online option'];
      } else if (lowerReply.includes('name') || lowerReply.includes('contact') || lowerReply.includes('follow up')) {
        quickReplies = [];
      } else {
        quickReplies = ['Tell me more', 'Talk to someone', 'Book now'];
      }

      addMessage('maya', reply, quickReplies);
    } else {
      addMessage('maya', "I'm having a little trouble right now. Please call us directly at (718) 922-2600 and our team will be happy to help you right away!");
    }
  } catch (error) {
    hideTyping();
    addMessage('maya', "Sorry about that — something went wrong on my end! Give us a call at (718) 922-2600 and our team will get you sorted out right away. We're here Monday to Friday 9am to 6pm and Saturday 10am to 4pm!");
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

async function sendMessage() {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  await getAIResponse(text);
}

// Auto-resize textarea
document.getElementById('inputBox').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Enter to send
document.getElementById('inputBox').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Initial greeting
window.addEventListener('load', () => {
  setTimeout(() => {
    const greeting = "Hey there! Welcome to Image Driving School — Brooklyn's most trusted driving school since 1979! 🚗 I'm Maya and I'm here to make getting your license as easy as possible. Whether you're just starting out or need a refresher, you're in the right place! What brings you in today?";
    conversationHistory.push({ role: 'assistant', content: greeting });
    addMessage('maya', greeting, ['Book a Lesson', '5 Hour Class', 'Defensive Driving', 'Road Test Info']);
  }, 600);
});
</script>
</body>
</html>
